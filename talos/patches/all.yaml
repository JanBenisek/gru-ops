# patches/all.yaml 
machine:
  features:
    hostDNS:
      enabled: false
  # kubelet:
  #   clusterDNS:
  #     - 192.168.178.1
  install:
    disk: /dev/nvme0n1
    image: ghcr.io/siderolabs/installer:v1.8.3 # Allows for supplying the image used to perform the installation.
    wipe: True # Indicates if the installation disk should be wiped at installation time.
  
  sysctls:
    vm.nr_hugepages: "1024" # for EBS
  #nodeLabels:
    # I think this was wrong with just 1 disk, I removed it from node without a disk
    # removed with `t -n 192.168.178.38 edit machineconfig`
    # openebs.io/engine: "mayastor" # for EBS
  # also removed kubelet extra mounts and added it to controlplane
cluster: 
  allowSchedulingOnControlPlanes: true
  clusterName: gru