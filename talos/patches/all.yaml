machine:
  features:
    hostDNS:
      enabled: false
  # if applied to all, worker gets this DNS instead internal and stuff stops working
  # kubelet:
  #   clusterDNS:
  #     - 192.168.178.1
  install:
    disk: /dev/nvme0n1
    image: ghcr.io/siderolabs/installer:v1.8.3 # Allows for supplying the image used to perform the installation.
    wipe: True # Indicates if the installation disk should be wiped at installation time.

  sysctls:
    vm.nr_hugepages: "1024" # for EBS, remove in the next update
  nodeLabels:
    openebs.io/engine: "mayastor" # for EBS, remove in the next update
  # also removed kubelet extra mounts and added it to controlplane
cluster:
  allowSchedulingOnControlPlanes: true
  clusterName: gru
  apiServer:
    admissionControl: # Needed by EBS, remove in the next update
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1beta1
          kind: PodSecurityConfiguration
          exemptions:
            namespaces:
              - mayastor
