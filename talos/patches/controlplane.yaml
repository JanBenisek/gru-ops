# patches/controlplane.yaml
cluster:
  allowSchedulingOnControlPlanes: true
  apiServer:
    admissionControl: # Needed by EBS
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1beta1
          kind: PodSecurityConfiguration
          exemptions:
            namespaces:
              - mayastor
machine:
  # moved from all.yaml
  nodeLabels:
    openebs.io/engine: "mayastor" # for EBS
  network:
    hostname: kevin
  kubelet:
    clusterDNS:
      - 192.168.178.1
