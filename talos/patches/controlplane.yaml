# patches/controlplane.yaml
cluster:
  apiServer:
    admissionControl: # Needed by EBS
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1beta1
          kind: PodSecurityConfiguration
          exemptions:
            namespaces:
              - mayastor
machine:
  # moved from all.yaml
  nodeLabels:
    openebs.io/engine: "mayastor" # for EBS
  network:
    hostname: kevin
  # changed in place with `edit machineconfig`
  kubelet:
    extraMounts: # for EBS
      - destination: /var/mnt/storage
        type: bind
        source: /var/mnt/storage
        options:
          - bind
          - rshared
          - rw
  disks:
      - device: /dev/sda
        partitions:
          - mountpoint: /var/mnt/storage # Where to mount the partition.
