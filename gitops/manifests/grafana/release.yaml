apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      version: "8.5.10"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: grafana
  interval: 50m
  values:
    ingress:
      enabled: true 
      ingressClassName: nginx
      annotations:
        kubernetes.io/ingress.class: "nginx"
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        # kubernetes.io/tls-acme: "true"
      tls:
      - hosts:
          # - "grafana.pengiuns.com"
          - "grafana.${DOMAIN_NAME}"
        secretName: letsencrypt-wildcard-cert-pengiuns.com-production
      hosts:
        - grafana.pengiuns.com
        # - host: grafana.pengiuns.com
        #   paths:
        #     - path: /
        #       # pathType: ImplementationSpecific
        #       pathType: Prefix
        #       backend:
        #         service:
        #           name: grafana
        #           port:
        #             number: 3000
    