apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  releaseName: grafana
  chart:
    spec:
      chart: grafana
      version: "8.5.10"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: grafana
  interval: 50m
  values:
    ingress:
      enabled: true 
      className: "nginx"
      annotations:
        kubernetes.io/ingress.class: "nginx"
        # external-dns.alpha.kubernetes.io/target: grafana.pengiuns.com
        # kubernetes.io/tls-acme: "true"
      hosts:
        - grafana.pengiuns.com
        # - host: grafana.pengiuns.com
