apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raycluster-ingress-head-ingress
  labels:
    app: raycluster
    app.kubernetes.io/name: raycluster
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "0" 
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "1000"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1000"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1000"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "1000"
spec:
  ingressClassName: nginx  
  rules:
  - host: raycluster.${DOMAIN_NAME}
    http:
      paths:
      - backend:
          service:
            name: raycluster-kuberay-head-svc 
            port:
              number: 80 #8265 is where dashboard is originally
        path: /
        pathType: Prefix  
  tls:
  - hosts:
      - raycluster.${DOMAIN_NAME}
    secretName: letsencrypt-wildcard-cert-pengiuns.com-production



