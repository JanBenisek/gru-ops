apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: benisekj@gmail.com
    # Name of a secret used to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - selector:
        dnsZones:
          - "pengiuns.com"
      dns01:
        cloudflare:
          email: benisekj@gmail.com
          apiTokenSecretRef:
            name: cloudflare-api-key # need to be created in this namespace
            key: apiKey
