apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: letsencrypt-wildcard-cert-pengiuns.com-production
  namespace: letsencrypt-wildcard-cert
spec:
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "" # all
  secretName: letsencrypt-wildcard-cert-pengiuns.com-production
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "pengiuns.com"
    - "*.pengiuns.com"
  duration: 2160h # 90 days (default)
  renewBefore: 360h # 15 days
