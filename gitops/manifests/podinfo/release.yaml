apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: podinfo
spec:
  releaseName: podinfo
  chart:
    spec:
      chart: podinfo
      sourceRef:
        kind: HelmRepository
        name: podinfo
  interval: 50m
  install:
    remediation:
      retries: 3
  # Default values
  # https://github.com/stefanprodan/podinfo/blob/master/charts/podinfo/values.yaml
  values:
    redis:
      enabled: true
      repository: public.ecr.aws/docker/library/redis
      tag: 7.0.6
    service: 
      enabled: true
      type: ClusterIP  
    ingress:
      enabled: true
      className: ""
      # annotations:
        # external-dns.alpha.kubernetes.io/hostname: podinfo.pengiuns.com 
      hosts:
        - host: podinfo.pengiuns.com
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: letsencrypt-wildcard-cert
          hosts:
            - podinfo.pengiuns.com
