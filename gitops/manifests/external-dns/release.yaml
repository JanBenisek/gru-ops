apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  chart:
    spec:
      chart: external-dns
      version: "8.5.1"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: external-dns
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    logLevel: debug
    # txtPrefix: "external-dns."
    image:
      pullPolicy: Always
    domainFilters:
    - "pengiuns.com"
    sources:
      # - crd # TBD what's better
      - service
      - ingress
    provider: cloudflare
    cloudflare:
      proxied: false # default is true which did not work, but review
      secretName: "cloudflare-api-token" # the key HAS TO BE `cloudflare_api_token`
