apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  chart:
    spec:
      chart: external-dns
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: external-dns
      version: "8.3.9"
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    provider: cloudflare
    cloudflare:
      apiToken: "CF_API_TOKEN"
      email: "CF_API_EMAIL"
    # crd: # TBD how to add domains
    #   create: true
    # sources:
    #   - crd
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: apiToken
      - name: CF_API_EMAIL
        value: "benisekj@gmail.com" #TODO: as a secret