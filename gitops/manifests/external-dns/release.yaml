apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  chart:
    spec:
      chart: external-dns
      version: "8.3.9"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: external-dns
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    logLevel: debug
    # txtPrefix: "external-dns."
    image:
      pullPolicy: Always
    domainFilters:
    - "pengiuns.com"
    sources:
      # - crd # TBD what's better
      - service
      - ingress
    provider: cloudflare
    cloudflare:
      proxied: false # default is true which did not work, but review
      # apiKey: CF_API_KEY
      # email: CF_API_EMAIL
      # apiToken: "DVzmh9hcRb_l9pmZrvXpPWFP7Ym67EP3yXqJX8n8"
      # secretName: "cloudflare-api-token"
      env:
        - name: CF_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflare-api-token
              key: apiToken
      # - name: CF_API_KEY
      #   valueFrom:
      #     secretKeyRef:
      #       name: cloudflare-api-key
      #       key: apiKey
      # - name: CF_API_EMAIL
      #   valueFrom:
      #     secretKeyRef:
      #       name: cloudflare-api-key
      #       key: email
# k create secret generic cloudflare-api-token --from-literal=apiToken=CF_API_TOKEN -n external-dns
# k create secret generic cloudflare-api-key --from-literal=apiKey=CF_API_KEY --from-literal=email=EMAIL -n external-dns