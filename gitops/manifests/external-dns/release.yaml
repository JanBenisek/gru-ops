apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  chart:
    spec:
      chart: external-dns
      version: "6.20.4"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: external-dns
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    domainFilters:
    - "pengiuns.com"
    sources:
      # - crd # TBD what's better
      - service
      - ingress
    provider: cloudflare
    cloudflare:
      apiToken: CF_API_TOKEN
      # apiToken: CF_API_TOKEN®
    env:
      # - name: CF_API_TOKEN
      #   valueFrom:
      #     secretKeyRef:
      #       name: cloudflare-api-key
      #       key: apiKey
      - name: CF_API_KEY
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: apiKey
      - name: CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: email
# k create secret generic cloudflare-api-key --from-literal=apiKey=CF_API_TOKEN -n external-dns
# k create secret generic cloudflare-api-key --from-literal=apiKey=CF_API_KEY --from-literal=email=EMAIL -n external-dns