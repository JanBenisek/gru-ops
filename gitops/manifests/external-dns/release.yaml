apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  chart:
    spec:
      chart: external-dns
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: external-dns
      version: "8.3.7"
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    sources:
      # - crd # TBD what's better
      - service
      - ingress
    provider: cloudflare
    # cloudflare:
    #   apiToken: CF_API_TOKEN
    policy: sync
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-cloudflare-token
            key: apiToken
      # - name: CF_API_EMAIL
      #   value: "benisekj@gmail.com" #TODO: as a secret