apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  interval: 1h0m0s
  chart:
    spec:
      chart: external-dns
      version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
  install:
    remediation:
      retries: 3
  values:
    logLevel: debug
    image:
      pullPolicy: Always
    domainFilters:
    - "pengiuns.com"
    - "swisshikefinder.com"
    - "funnaiest.com"
    sources:
      # - crd # TBD what's better
      - service
      - ingress
    provider:
      name: cloudflare
      proxied: false

    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: cloudflare_api_token
      # cloudflare:
      #   secretName: cloudflare-api-token # the key HAS TO BE `cloudflare_api_token`

    registry: txt

    txtOwnerId: external-dns-gru

    # available values are `create-only`, `sync`, & `upsert-only`.
    policy: sync # mirrors dns records based on on txtOwnerId, (insert, update, delete)
    
    resources:
      requests:
        memory: "128Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "200m"

