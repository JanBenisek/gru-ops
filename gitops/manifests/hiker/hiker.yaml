apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiker
  namespace: hiker
  labels:
    app: hiker
    app.kubernetes.io/name: hiker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hiker
  template:
    metadata:
      labels:
        app: hiker
    spec:
      containers:
      - name: nginx
        image: ghcr.io/janbenisek/swisshikefinder:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080 # internal port for the app
        resources: # added by me
          requests:
            memory: "256Mi"  
            cpu: "100m"      
          limits:
            memory: "512Mi"  
            cpu: "500m"    
---
apiVersion: v1
kind: Service
metadata:
  name: hiker
  namespace: hiker
  labels:
    app: hiker
    app.kubernetes.io/name: hiker
spec:
  selector:
    app: hiker
  ports:
  - name: http
    port: 80 # we talk to 80
    protocol: TCP
    targetPort: 8080 # app listens here
  # type: LoadBalancer # for debugging
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hiker
  labels:
    app: hiker
    app.kubernetes.io/name: hiker
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  rules:
  - host: hiker.${DOMAIN_NAME}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hiker
            port:
              number: 80
  tls:
  - hosts:
      - hiker.${DOMAIN_NAME}
    secretName: letsencrypt-wildcard-cert-pengiuns.com-production
