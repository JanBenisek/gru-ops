apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiker
  namespace: hiker
  labels:
    app: hiker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hiker
  template:
    metadata:
      labels:
        app: hiker
    spec:
      containers:
      - name: nginx
        image: ghcr.io/janbenisek/swisshikefinder:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hiker
  namespace: hiker
spec:
  selector:
    app: hiker
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  type: LoadBalancer
