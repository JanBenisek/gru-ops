apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia
spec:
  interval: 30m
  chart:
    spec:
      chart: authelia
      version: "0.10.46"
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: authelia
      interval: 12h
  values:
    # here
    replicaCount: 1

    image:
      repository: authelia/authelia
      tag: latest
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 9091

    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: "nginx"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        hosts:
          - host: authelia.${DOMAIN_NAME}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: letsencrypt-wildcard-cert-pengiuns.com-production
            hosts:
              - authelia.${DOMAIN_NAME}

    authenticationBackend:
      # using file backend for simplicity
      file:
        enabled: true
        path: /config/users_database.yml

    storage:
      local:
        enabled: true
        persister:
          enabled: false

    config:
      # minimal Authelia configuration
      theme: default
      log:
        level: info
      server:
        host: 0.0.0.0
        port: 9091
      authentication_backend:
        file:
          path: /config/users_database.yml
      session:
        name: authelia_session
        timeout: 3600
        domain: example.com
      regulatory:
        deny_disposable_email: false
      # NOTE: you will likely need to configure your own ldap or oauth backend for production

    resources:
      limits:
        cpu: 200m
        memory: 512MiB
      requests:
        cpu: 100m
        memory: 256Mi