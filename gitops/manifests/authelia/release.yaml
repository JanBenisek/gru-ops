apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia
spec:
  interval: 30m
  chart:
    spec:
      chart: authelia
      version: "0.10.46"
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: authelia
      interval: 12h
  values:
    image:
      repository: authelia/authelia
      tag: latest
      pullPolicy: IfNotPresent

    ingress:
      enabled: true
      className: 'nginx'
      annotations: 'nginx'
        kubernetes.io/ingress.class: "nginx"
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
      rulesOverride:
        - host: authelia.${DOMAIN_NAME}
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: authelia
                    port:
                      number: 9091
      tls:
        enabled: true
        secret: letsencrypt-wildcard-cert-pengiuns.com-production
    
    pod:
      resources:
        limits:
          cpu: 200m
          memory: 512MiB
        requests:
          cpu: 100m
          memory: 256Mi

    configMap:
      log:
        level: 'debug'

      storage:
        local:
          enabled: false
        postgres:
          enabled: false
          deploy: false
          address: 'tcp://postgres.databases.svc.cluster.local:5432'
          database: 'authelia'
          schema: 'public'
          username: 'authelia'
          password:
            secret_name: ~
            value: ''

    persistence:
      enabled: false
