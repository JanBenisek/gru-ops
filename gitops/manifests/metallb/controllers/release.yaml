apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 1m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  chart:
    spec:
      chart: metallb
      version: '0.14.5'
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: metallb-system
  values:
    tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule" # allow to schedule on master node