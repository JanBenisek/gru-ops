apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg
  namespace: cnpg
spec:
  resources: 
    requests:
      memory: "2Gi"  
      cpu: "200m"      
    limits:
      memory: "3Gi"  
      cpu: "500m"

  monitoring:
    # -- Whether to enable monitoring
    enabled: true

  instances: 1
  imageName: "tensorchord/vchord-suite:pg17-20250901"
  imagePullPolicy: Always
  storage:
    pvcTemplate:
      spec:
        volumeName: pvc-cnpg-cluster
  bootstrap:
    # TODO: Enable once all is working
    # superuserSecret:
    #   name: cnpg-superuser
    initdb:
      database: immich # CREATE DATABASE immich;
      owner: bot_immich # CREATE ROLE bot_immich; --will be owner
      secret:
        name: bot-immich-pswd
      extensions:
        - vchord
        - pg_tokenizer
        - vchord_bm25
      # Kept just in case
      # postInitSQL:
      #   - configMapRef:
      #       name: config-init-sql
      #       key: init.sql
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
    # Just in case :) 
    # roles:
    #   - name: myuser
    #     superuser: false
    #     createdb: true
    #     login: true
    #     passwordSecret:
    #       name: myuser-secret

  managed:
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: cnpg-rw-lb
              annotations:
                external-dns.alpha.kubernetes.io/hostname: vchord-postgres.${DOMAIN_NAME}
            spec:
              type: LoadBalancer
              loadBalancerIP: 192.168.178.190 # pick from `k get ipaddresspool -A`
              ports:
                - name: postgresql
                  port: 5432
                  targetPort: 5432
