apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg
  namespace: cnpg
spec:
  instances: 1
  
  superuserSecret:
    name: superuser-pswd
    
  resources: 
    requests:
      memory: "2Gi"  
      cpu: "200m"      
    limits:
      memory: "3Gi"  
      cpu: "500m"

  # Why not working?
  # monitoring:
  #   enabled: true
  # imageName: "tensorchord/vchord-suite:pg17-20250901"
  imageName: "ghcr.io/tensorchord/cloudnative-vectorchord:16-0.4.2" # TODO: figure out which version
  imagePullPolicy: Always

  storage:
    size: 5Gi
    storageClass: local-hostpath-kevin

  bootstrap:
    initdb:
      database: immich # CREATE DATABASE immich;
      owner: bot_immich # CREATE ROLE bot_immich; --will be owner
      secret:
        name: bot-immich-pswd
      postInitSQL:
        - "CREATE EXTENSION IF NOT EXISTS vector;"
        - "CREATE EXTENSION IF NOT EXISTS vchord;"
        # - "CREATE EXTENSION IF NOT EXISTS pg_tokenizer;"
        # - "CREATE EXTENSION IF NOT EXISTS vchord_bm25;"
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: cnpg-rw-lb
              annotations:
                external-dns.alpha.kubernetes.io/hostname: vchord-postgres.${DOMAIN_NAME}
            spec:
              type: LoadBalancer
              loadBalancerIP: 192.168.178.190 # pick from `k get ipaddresspool -A`
              ports:
                - name: postgresql
                  port: 5432
                  targetPort: 5432
    # Just in case :) 
    # roles:
    #   - name: myuser
    #     superuser: false
    #     createdb: true
    #     login: true
    #     passwordSecret:
    #       name: myuser-secret
