# I need that annotation on that pod and for the god's sake I am not able to add the annotation
# so we are doing this hack.
# Start immediately
# k create job --from=cronjob/annotate-cnpg-1 annotate-cnpg-1-manual -n cnpg
apiVersion: batch/v1
kind: CronJob
metadata:
  name: annotate-cnpg-1
  namespace: cnpg
spec:
  schedule: "0 2 * * 0"   # Sunday at 2:00 AM
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: annotate-cnpg
          containers:
            - name: annotator
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  wget -qO /usr/local/bin/kubectl https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
                  chmod +x /usr/local/bin/kubectl
                  kubectl annotate pod cnpg-1 \
                    k8up.io/backupcommand="sh -c 'PGDATABASE=immich pg_dump --clean'" \
                    k8up.io/file-extension=".sql" \
                    --overwrite -n cnpg
                    restartPolicy: OnFailure
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: annotate-cnpg
  namespace: cnpg
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: annotate-cnpg-role
  namespace: cnpg
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: annotate-cnpg-rolebinding
  namespace: cnpg
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: annotate-cnpg-role
subjects:
  - kind: ServiceAccount
    name: annotate-cnpg
    namespace: cnpg
