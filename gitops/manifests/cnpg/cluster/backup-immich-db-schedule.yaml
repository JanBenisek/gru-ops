apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: backup-immich-db-schedule
  namespace: cnpg
spec:
  backend:
    s3:
      endpoint: https://hel1.your-objectstorage.com
      bucket: pengiunsbackup
      accessKeyIDSecretRef:
        name: hetzner-credentials
        key: username
      secretAccessKeySecretRef:
        name: hetzner-credentials
        key: password
    repoPasswordSecretRef:
      name: restic-credentials
      key: password
  backup:
    schedule: "0 2 * * *" # runs daily at 2am
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
    podTemplate:
      spec:
        containers:
          - name: backup
            env:
              - name: POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: bot-immich-pswd
                    key: username
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: bot-immich-pswd
                    key: password
              - name: POSTGRES_DB
                value: immich
              - name: PGHOST
                value: cnpg-rw-lb.cnpg.svc.cluster.local # or vchord-postgres.pengiuns.com
              - name: PGPORT
                value: "5432"
        restartPolicy: Never
    # optional
    # promURL: https://prometheus-io-instance:8443
  check:
    schedule: '0 1 * * 1' # runs every monday, validates integrity of backup
    # optional
    #promURL: https://prometheus-io-instance:8443
  prune:
    schedule: '0 1 * * 0' #Every sunday at 1am, prunes based on retention policy
    retention:
      keepLast: 5 # keeps last 5 snapshots
      keepDaily: 14 # one backup per day for 14 days