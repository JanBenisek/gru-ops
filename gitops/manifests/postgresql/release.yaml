apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgresql
  namespace: postgresql
spec:
  interval: 30m
  chart:
    spec:
      chart: postgresql
      version: "16.7.8"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: postgresql
      interval: 12h
  values:
    global:
      postgresql:
        auth:
          # TODO: Replace with sealed secrets
          # postgresPassword: mysecurepassword #pswd for `postgres` admin user # user_postgres
          username: bot_jerry
          database: prod
          existingSecret: psql-secrets
          secretKeys:
            adminPasswordKey: user_postgres
            userPasswordKey: user_bot_jerry
    
    image:
      registry: docker.io
      repository: bitnami/postgresql
      tag: 17.5.0-debian-12-r8
      
    architecture: standalone

    containerPorts:
      postgresql: 5432
    
    primary: # primary DB
      name: master

      initdb:
        scripts: # executed by `postgres` admin user
          init.sql: |
            create database metabase;

      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 512Mi

      persistence:
        enabled: true
        existingClaim: pvc-postgresql

      service:
        type: LoadBalancer
        ports:
          postresql: 5432
        loadBalancerIP: 192.168.178.150 # pick from `k get ipaddresspool -A`
        annotations:
          external-dns.alpha.kubernetes.io/hostname: postgresql.${DOMAIN_NAME}
      
    metrics:
      enabled: true