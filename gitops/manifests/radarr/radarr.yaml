apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: radarr
  labels:
    app: radarr
    app.kubernetes.io/name: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
        app.kubernetes.io/name: radarr
    affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname 
                    operator: In 
                    values:
                      - stuart
    spec:
      containers:
      - name: radarr
        image: ghcr.io/hotio/radarr
        imagePullPolicy: Always
        ports:
        - containerPort: 7878 
        env:
        - name: PUID
          value: "1000"   # User ID for file permissions
        - name: PGID
          value: "1000"   # Group ID for file permissions
        - name: UMASK
          value: "002"    # Umask setting for file creation permissions
        - name: TZ
          value: "Etc/UTC" # Timezone
        resources: # added by me
          requests:
            memory: "5G"  
            cpu: "10m0m"      
          limits:
            memory: "10G"  
            cpu: "1200m"
        volumeMounts:
        - mountPath: /data  # Single volume for Movies and Downloads
          name: data-storage # link to volumes
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: pvc-radarr-data # connects it to PVC
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: radarr
  labels:
    app.kubernetes.io/name: radarr
spec:
  selector:
    app: radarr
  ports:
  - name: http
    port: 7878 # we talk to this
    protocol: TCP
    targetPort: 7878 # app listens here
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radarr
  labels:
    app: radarr
    app.kubernetes.io/name: radarr
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  rules:
  - host: radarr.${DOMAIN_NAME}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: radarr
            port:
              number: 80
  tls:
  - hosts:
      - radarr.${DOMAIN_NAME}
    secretName: letsencrypt-wildcard-cert-pengiuns.com-production
