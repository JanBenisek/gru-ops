apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 30m
  chart:
    spec:
      chart: harbor
      version: '1.15.1'
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: harbor
      interval: 12h
  values:
    persistence:
      enabled: true
      resourcePolicy: "keep"
      persistentVolumeClaim:
        registry:
          existingClaim: "pvc-harbor"
          subPath: "registry"
        chartmuseum:
          existingClaim: "pvc-harbor"
          subPath: "chartmuseum"
        jobservice:
          existingClaim: "pvc-harbor"
          subPath: "jobservice"
        database:
          existingClaim: "pvc-harbor"
          subPath: "database"
        redis:
          existingClaim: "pvc-harbor"
          subPath: "redis"
        trivy:
          existingClaim: "pvc-harbor"
          subPath: "trivy"
    externalURL: "https://harbor.${DOMAIN_NAME}"
    harborAdminPassword: admin
    notary:
      enabled: false
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: "secret"
        secret:
          secretName: "harbor-core-tls"
          notarySecretName: "harbor-notary-tls"
      ingress:
        hosts:
          core: harbor.${DOMAIN_NAME}
          notary: harbor-notary.${DOMAIN_NAME}
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
          kubernetes.io/ingress.class: "nginx"
          nginx.ingress.kubernetes.io/ssl-redirect: "false"
          nginx.ingress.kubernetes.io/proxy-body-size: "100000m"
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
          nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "300"
    database:
      type: internal
