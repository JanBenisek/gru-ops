kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pvc-harbor
  namespace: harbor
spec:
  storageClassName: local-hostpath-kevin
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # volumeName: pv-hiker # this is static definition, dynamic creates PV automatically, which seems recommended
