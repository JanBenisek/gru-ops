apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: it-tools
  namespace: it-tools
spec:
  interval: 30m
  chart:
    spec:
      chart: it-tools
      version: "2.1.2"
      sourceRef:
        kind: HelmRepository
        name: it-tools
        namespace: it-tools
      interval: 12h
  values:
    resources:
      requests:
        memory: "128Mi"
        cpu: "10m"
      limits:
        memory: "256Mi"
        cpu: "100m"
    controllers:
      main:
        containers:
          app:
            env:
              TZ: "Europe/Zurich" #UTC
    persistence:
      data:
        enabled: false
    ingress:
      main:
        enabled: true
        className: nginx
        annotations:
          kubernetes.io/ingress.class: "nginx"
        hosts:
          - host: it-tools.${DOMAIN_NAME}
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        tls:
          - secretName: letsencrypt-wildcard-cert-pengiuns.com-production
            hosts:
              - it-tools.${DOMAIN_NAME}
