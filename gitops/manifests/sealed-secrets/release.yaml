apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  releaseName: sealed-secrets
  chart:
    spec:
      chart: sealed-secrets
      version: "2.16.2"
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: sealed-secrets
  interval: 1h0m0s
  timeout: 10m
  values:
    resources: 
      requests:
        memory: "125Mi"  
        cpu: "10m"      
      limits:
        memory: "256Mi"  
        cpu: "100m"    
    
