apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8up
  namespace: k8up
spec:
  interval: 30m
  chart:
    spec:
      chart: k8up
      version: "4.8.4"
      sourceRef:
        kind: HelmRepository
        name: k8up
        namespace: k8up
      interval: 12h
  values:
    replicaCount: 1
    image:
      # -- Operator image pull policy
      pullPolicy: IfNotPresent
      # -- Operator image registry
      registry: ghcr.io
      # -- Operator image repository
      repository: k8up-io/k8up
      # -- Operator image tag (version)
      tag: v2.12.0

    k8up:
      timezone: "Europe/Zurich"

      globalResources:
        requests:
          # -- Global CPU resource requests applied to jobs. See [supported units][resource-units].
          cpu: "200m"
          # -- Global Memory resource requests applied to jobs. See [supported units][resource-units].
          memory: "1Gi"
        limits:
          # -- Global CPU resource limit applied to jobs. See [supported units][resource-units].
          cpu: "500m"
          # -- Global Memory resource limit applied to jobs. See [supported units][resource-units].
          memory: "3Gi"





    image:
      repository: metabase/metabase
      tag: "v0.54.10.4"
      pullPolicy: IfNotPresent

    monitoring:
      enabled: true
    
    resources:
      requests:
        memory: "2Gi"
        cpu: "200m"
      limits:
        memory: "3Gi"
        cpu: "5000m"
    
    ingress:
      enabled: true
      hosts:
        - "metabase.${DOMAIN_NAME}"
      annotations:
        kubernetes.io/ingress.class: "nginx"
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/proxy-body-size: 100m
        nginx.ingress.kubernetes.io/proxy-connect-timeout: 900
        nginx.ingress.kubernetes.io/proxy-send-timeout: 900
        nginx.ingress.kubernetes.io/proxy-read-timeout: 900
        nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: 900
      
      tls:
        - secretName: letsencrypt-wildcard-cert-pengiuns.com-production
          hosts:
            - "metabase.${DOMAIN_NAME}"
    
    database:
      type: postgres
      host: "${POSTGRESQL_HOST}"
      port: 5432
      dbname: metabase
      # username: bot_metabase
      existingSecret: bot-metabase-pswd
      existingSecretUsernameKey: bot_metabase_user
      existingSecretPasswordKey: bot_metabase_pswd
    
    service:
      labels:
        app.kubernetes.io/name: "metabase"