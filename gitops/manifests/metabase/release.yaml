apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metabase
  namespace: metabase
spec:
  interval: 30m
  chart:
    spec:
      chart: metabase
      version: "2.18.1"
      sourceRef:
        kind: HelmRepository
        name: metabase
        namespace: metabase
      interval: 12h
  values:

    image:
      repository: metabase/metabase
      tag: "v0.54.10.4"
      pullPolicy: IfNotPresent

    monitoring:
      enabled: true
    
    resources:
      requests:
        memory: "2Gi"
        cpu: "200m"
      limits:
        memory: "3Gi"
        cpu: "5000m"
    
    ingress:
      enabled: true
      hosts:
        - "metabase.${DOMAIN_NAME}"
      annotations:
        kubernetes.io/ingress.class: "nginx"
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/proxy-body-size: 100m
        nginx.ingress.kubernetes.io/proxy-connect-timeout: 900
        nginx.ingress.kubernetes.io/proxy-send-timeout: 900
        nginx.ingress.kubernetes.io/proxy-read-timeout: 900
        nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: 900
      
      tls:
        - secretName: letsencrypt-wildcard-cert-pengiuns.com-production
          hosts:
            - "metabase.${DOMAIN_NAME}"
    
    database:
      type: postgres
      host: "${POSTGRESQL_HOST}"
      port: 5432
      dbname: metabase
      username: bot_metabase
      existingSecret: bot-metabase-pswd
      # existingSecretUsernameKey: METABASE_POSTGRESQL_USERNAME
      existingSecretPasswordKey: bot_metabase_pswd
    service:
      labels:
        app.kubernetes.io/name: "metabase"