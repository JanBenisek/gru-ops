apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: openebs
spec:
  interval: 30m
  chart:
    spec:
      chart: openebs
      version: "4.1.1"
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: openebs
      interval: 12h
  values:
    # https://github.com/openebs/openebs/blob/main/charts/values.yaml
    # TODO: add resource limitations
    localpv-provisioner:
      hostpathClass:
        enabled: false # disable default SC
    image:
      pullPolicy: IfNotPresent #Always got me rate limited
    engines:
      local:
        lvm:
          enabled: true
        zfs:
          enabled: false
      replicated:
        mayastor:
          enabled: false
      