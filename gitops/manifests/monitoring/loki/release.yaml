apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: loki-stack
  namespace: monitoring
spec:
  interval: 1m
  chart:
    spec:
      chart: loki-stack
      version: '2.10.2'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 1m
  values:
    loki:
      image:
        # there is a bug where it pulls by default some old tag
        tag: 2.9.3
      # serviceAccount: # do I need this?
      #   name: loki
      #   create: false
    promtail:
      enabled: true
      config:
        logLevel: debug
      tolerations:
      - effect: NoSchedule
        operator: Exists
    grafana:
      enabled: false
    prometheus:
      enabled: false
