apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 50m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '70.0.2'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
  # I think the persistence fucks things up
  # currently all has to run on 1 node to use storage
  # but Grafana needs to run on all nodes
    grafana:
      enabled: true
      adminPassword: admin
      grafana.ini:
        users:
          auto_assign_org_role: Admin
          default_theme: light
        server:
          root_url: https://grafana.${DOMAIN_NAME}
        auth.basic:
          enabled: false
        # new stuff, experiment with kuberay grafana embedding
        security:
          allow_embedding: true
        auth.anonymous:
          enabled: true
          org_role: Viewer
      # persistence:
      #   type: pvc
      #   enabled: true
      #   storageClassName: local-hostpath-kevin
      #   accessModes:
      #     - ReadWriteOnce
      #   size: 10Gi
      # additionalDataSources: # Enable later? But then need dependsOn
      #   - name: Loki
      #     type: loki
      #     url: http://loki:3100 # it listens to 3100 (see k describe)
      #     access: direct
      #     basicAuth: false
      #     isDefault: false
      ingress:
        enabled: true 
        ingressClassName: nginx
        annotations:
          kubernetes.io/ingress.class: "nginx"
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
        hosts:
          - grafana.${DOMAIN_NAME}
        tls:
          - hosts:
              - grafana.${DOMAIN_NAME}
            secretName: letsencrypt-wildcard-cert-pengiuns.com-production
    # prometheus:
    #   prometheusSpec:
    #     storageSpec:
    #       volumeClaimTemplate:
    #         spec:
    #           storageClassName: local-hostpath-kevin
    #           accessModes: ["ReadWriteOnce"]
    #           resources:
    #             requests:
    #               storage: 5Gi
    #     retentionSize: 5GB
    #     retention: 90d