apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  releaseName: kube-prometheus-stack
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "65.5.1"
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring
  interval: 50m
  values:
    grafana:
      enabled: true
      grafana.ini:
        users:
          auto_assign_org_role: Admin
          default_theme: light
        server:
          root_url: https://grafana.${DOMAIN_NAME}
        auth.basic:
          enabled: false
      persistence:
        enabled: false
      ingress:
        enabled: true 
        ingressClassName: nginx
        annotations:
          kubernetes.io/ingress.class: "nginx"
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
        tls:
        - hosts:
            - grafana.${DOMAIN_NAME}
          secretName: letsencrypt-wildcard-cert-pengiuns.com-production
    # prometheus:
    