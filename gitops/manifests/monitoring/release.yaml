apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 50m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "65.5.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    grafana:
      enabled: true
      adminPassword: admin
      # grafana.ini:
      #   users:
      #     auto_assign_org_role: Admin
      #     default_theme: light
      #   server:
      #     root_url: https://grafana.${DOMAIN_NAME}
      #   auth.basic:
      #     enabled: false
      persistence:
        enabled: false
      ingress:
        enabled: true 
        ingressClassName: nginx
        annotations:
          kubernetes.io/ingress.class: "nginx"
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
        tls:
        - hosts:
            - grafana.${DOMAIN_NAME}
          secretName: letsencrypt-wildcard-cert-pengiuns.com-production
    prometheus:
      enabled: true

---

# Loki+promtail
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: loki-stack
  namespace: monitoring
spec:
  interval: 1m
  chart:
    spec:
      chart: loki-stack
      version: '2.10.2'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 1m
  values:
    promtail:
      config:
        logLevel: debug
      tolerations:
      - effect: NoSchedule
        operator: Exists
    loki:
