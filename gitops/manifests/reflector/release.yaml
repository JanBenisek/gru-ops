apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: reflector
  namespace: reflector
spec:
  interval: 5m0s
  chart:
    spec:
      chart: reflector
      version: "9.1.31"
      sourceRef:
        kind: HelmRepository
        name: reflector
        namespace: reflector
  values:
    # Default values for reflector.
    # This is a YAML-formatted file.
    # Declare variables to be passed into your templates.

    replicaCount: 1

    image:
      repository: docker.io/emberstack/kubernetes-reflector
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "9.1.31"

    imagePullSecrets: []
    nameOverride: ""
    namespaceOverride: ""
    fullnameOverride: ""

    cron:
      enabled: true
      schedule: "*/15 * * * *"
      activeDeadlineSeconds: 600
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

    configuration:
      logging:
        minimumLevel: Information
      watcher:
        timeout: ""
      kubernetes:
        skipTlsVerify: false

    rbac:
      enabled: true

    serviceAccount:
      # Specifies whether a service account should be created
      create: true
      # Annotations to add to the service account
      annotations: {}
      # The name of the service account to use.
      # If not set and create is true, a name is generated using the fullname template
      name: ""

    # additional annotations to set on the pod
    podAnnotations: {}
    # additional labels to set on the pod
    podLabels: {}
    # additional env vars to add to the pod
    extraEnv: []

    podSecurityContext:
      fsGroup: 2000

    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000

    livenessProbe:
      httpGet:
        path: /health/live
        port: http
      timeoutSeconds: 10
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /health/ready
        port: http
      timeoutSeconds: 10
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 5
    startupProbe:
      httpGet:
        path: /health/ready
        port: http
      timeoutSeconds: 10
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 5


    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi

    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80

    nodeSelector: {}

    tolerations: []

    affinity: {}

    topologySpreadConstraints: []

    priorityClassName: ""

    volumes: []

    volumeMounts: []