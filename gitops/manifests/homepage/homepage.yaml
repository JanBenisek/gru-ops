apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
secrets:
  - name: homepage

---

apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    kubernetes.io/service-account.name: homepage

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Home of pengiuns
    theme: dark
    layout:
      Media:
        style: row
        columns: 4
    headerStyle: clean
    language: en
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      showSearchSuggestions: true
      hideVisitURL: true
      provider: google
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - icon: github.png
              href: https://github.com/JanBenisek/gru-ops
    - Docs:
        - Notion:
            - icon: notion.png
              href: https://www.notion.so/Homelab-074c94b564de4cb7b57de7a7f60e0e1b
  services.yaml: |
    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.pengiuns.com
            description: Them logs!
            namespace: monitoring 
            app: grafana

    - Tools:
        - IT-Tools:
            icon: it-tools.png
            href: https://it-tools.pengiuns.com/
            description: Swiss knife of internet
            namespace: it-tools 
            app: it-tools
        - Stirling PDF:
            icon: stirling-pdf.png
            href: https://stirling.pengiuns.com/?lang=en_GB
            description: PDF tools
            namespace: stirling
            app: stirling

    - Fun:
        - Hiker:
            icon: go.png
            href: https://hiker.pengiuns.com
            description: Let's go hiking!
            namespace: hiker
            app: hiker
    
    - Experiments:
      - Router:
          icon: avmfritzbox.png
          href: https://fritz.box/
          description: Router boi
          widget:
            type: fritzbox
            url: http://192.168.178.1
            fields: ["down", "up", "received", "sent"]
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Gru"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: google
        target: _blank
    - openmeteo:
        label: Adliswil
        latitude: 47.310251355387244
        longitude: 8.524921680315584
        timezone: "Europe/Berlin"
        units: metric
        cache: 5
  docker.yaml: ""

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
  - apiGroups:
      - traefik.containo.us
    resources:
      - ingressroutes
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: homepage

---

apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
  # annotations:
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80 # Exposes the service on port 80
      protocol: TCP
      targetPort: 3000 # Routes traffic to port 3000 in the app
  # ports:
  #   - port: 3000
  #     targetPort: http
  #     protocol: TCP
  #     name: http
  selector:
    app.kubernetes.io/name: homepage

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources: # added by me
            requests:
              memory: "256Mi"  
              cpu: "100m"      
            limits:
              memory: "512Mi"  
              cpu: "500m"      
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    gethomepage.dev/description: Dynamically Detected Homepage
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Cluster Management
    gethomepage.dev/icon: homepage.png
    gethomepage.dev/name: Homepage
    # mine
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: homepage.${DOMAIN_NAME}
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 80 # changed from 3000
  tls:
    - hosts:
        - homepage.${DOMAIN_NAME}
      secretName: letsencrypt-wildcard-cert-pengiuns.com-production