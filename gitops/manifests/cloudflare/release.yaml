apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-tunnel
  namespace: cloudflare
spec:
  interval: 30m
  chart:
    spec:
      chart: cloudflare-tunnel
      version: "0.3.2"
      sourceRef:
        kind: HelmRepository
        name: cloudflare
        namespace: cloudflare
      interval: 12h
  values:
    # Cloudflare parameters.
    cloudflare:
      # Your Cloudflare account number.
      account: "6f72e3a2bfcc7b774fdcecc770035336"
      # The name of the tunnel this instance will serve
      tunnelName: "k8s-tunnel"
      # The ID of the above tunnel.
      tunnelId: "acdf4147-512c-4b16-8ce2-58915c6ab118"
      # The secret for the tunnel.
      secret: "eyJhIjoiNmY3MmUzYTJiZmNjN2I3NzRmZGNlY2M3NzAwMzUzMzYiLCJ0IjoiYWNkZjQxNDctNTEyYy00YjE2LThjZTItNTg5MTVjNmFiMTE4IiwicyI6IlpqbGpORFV6WW1FdFpUUXpZUzAwTTJSbUxXSTFaV1F0TnpNMU1ESXlNbVE1TXpaaCJ9"
      # If defined, no secret is created for the credentials, and instead, the secret referenced is used
      secretName: null
      # If true, turn on WARP routing for TCP
      enableWarp: false
      # Define ingress rules for the tunnel. See
      # https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/configuration/configuration-file/ingress
      ingress:
        - hostname: swisshikefinder.com
          # service: http://192.168.178.100 
          service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local
          # originRequest:
            # noTLSVerify: true  # Cloudflare trusts my internal cert
        # - service: http_status:404  # Catch-all for unhandled requests
        # - hostname: hello.example.com
        #   service: hello_world


    image:
      repository: cloudflare/cloudflared
      pullPolicy: Always
      # If supplied, this overrides "appVersion"
      tag: ""

    replicaCount: 2

    imagePullSecrets: []
    nameOverride: ""
    fullnameOverride: ""

    serviceAccount:
      # Annotations to add to the service account
      annotations: {}
      # The name of the service account to use.
      # If not set and create is true, a name is generated using the fullname template
      name: ""

    podAnnotations: {}
    podLabels: {}

    # Security items common to everything in the pod.  Here we require that it
    # does not run as the user defined in the image, literally named "nonroot".
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532

    # Security items for one container. We lock it down.
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true

    resources: {}
      # We usually recommend not to specify default resources and to leave this as a conscious
      # choice for the user. This also increases chances charts run on environments with little
      # resources, such as Minikube. If you do want to specify resources, uncomment the following
      # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi

    nodeSelector: {}

    tolerations: []

    # Default affinity is to spread out over nodes; use this to override.
    affinity: {}