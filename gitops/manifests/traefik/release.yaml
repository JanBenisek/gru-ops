apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  chart:
    spec:
      chart: traefik
      version: "32.1.1"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  interval: 15m
  timeout: 5m
  releaseName: traefik
  values:
    ingressRoute:
    dashboard:
      # -- Create an IngressRoute for the dashboard
      enabled: false