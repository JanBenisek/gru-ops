apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-proxy
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: "1.4.0"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: immich
      interval: 12h
  values:
    global:
      nameOverride: immich-proxy

    image:
      repository: alangrainger/immich-public-proxy
      tag: "1.5.4"
      pullPolicy: IfNotPresent

    env:
      IMMICH_URL: http://immich-server:2283

    service:
      main:
        enabled: true
        primary: true
        type: ClusterIP
        ports:
          http:
            enabled: true
            primary: true
            port: 3000
            protocol: HTTP

    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: "nginx"
          cert-manager.io/cluster-issuer: "letsencrypt-prod"
        hosts:
          - host: immich-share.${DOMAIN_NAME}
            paths:
              - path: "/"
                pathType: Prefix
        tls:
          - secretName: letsencrypt-wildcard-cert-pengiuns.com-production
            hosts:
              - immich-share.${DOMAIN_NAME}

    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"