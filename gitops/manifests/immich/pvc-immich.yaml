kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pvc-immich
  namespace: immich
  annotations:
    k8up.io/backup: "true" #  k annotate pvc pvc-immich k8up.io/backup=true
    # k label pvc pvc-immich back-me-up=true -n immich
spec:
  storageClassName: local-hostpath-kevin
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
