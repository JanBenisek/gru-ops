apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: immich-backup-schedule
  namespace: immich
spec:
  backend:
    s3:
      endpoint: https://hel1.your-objectstorage.com
      bucket: pengiunsbackup/immich/schedule/
      accessKeyIDSecretRef:
        name: hetzner-credentials
        key: username
      secretAccessKeySecretRef:
        name: hetzner-credentials
        key: password
    repoPasswordSecretRef:
      name: restic-credentials
      key: password
  backup:
    schedule: "0 2 * * *" # runs daily at 2am
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
    # optional
    #promURL: https://prometheus-io-instance:8443
  check:
    schedule: '0 1 * * 1' # runs every monday, validates integrity of backup
    # optional
    #promURL: https://prometheus-io-instance:8443
  prune:
    schedule: '0 1 * * 0' #Every sunday at 1am, prunes based on retention policy
    retention:
      keepLast: 5 # keeps last 5 snapshots
      keepDaily: 14 # one backup per day for 14 days