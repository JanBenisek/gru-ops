apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  chart:
    spec:
      chart: traefik
      version: 10.x 
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: ingress-nginx
  interval: 15m
  timeout: 5m
  releaseName: traefik