apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: authelia
  namespace: flux-system
spec:
  path: ./gitops/manifests/authelia
  interval: 15m
  prune: true 
  timeout: 20m 
  dependsOn:
    - name: ingress-nginx
      namespace: flux-system
    - name: sealed-secrets
      namespace: flux-system
  validation: server
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  # healthChecks:
