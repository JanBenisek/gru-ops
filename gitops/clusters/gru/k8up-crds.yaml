apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: k8up-crds
  namespace: flux-system
spec:
  path: ./gitops/manifests/k8up/crds
  interval: 15m
  prune: true
  timeout: 10m
  validation: server
  dependsOn:
    - name: external-dns
      namespace: flux-system
    - name: openebs
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
