apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: reflector
  namespace: flux-system
spec:
  path: ./gitops/manifests/reflector
  interval: 15m
  prune: true 
  timeout: 2m 
  sourceRef:
    kind: GitRepository
    name: flux-system
