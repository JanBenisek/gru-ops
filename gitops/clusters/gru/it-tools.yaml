apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: it-tools
  namespace: flux-system
spec:
  path: ./gitops/manifests/it-tools
  interval: 15m
  prune: true 
  timeout: 20m 
  validation: server
  dependsOn:
    - name: external-dns
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: it-tools
      namespace: it-tools