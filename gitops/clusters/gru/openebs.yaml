apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: openebs
  namespace: flux-system
spec:
  path: ./gitops/manifests/openebs
  interval: 15m
  prune: true
  timeout: 10m
  validation: server
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: openebs-lvm-localpv-controller # there are more
      namespace: openebs