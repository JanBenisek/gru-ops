apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-crds
  namespace: flux-system
spec:
  path: ./gitops/manifests/metallb/crds
  interval: 15m
  prune: true
  timeout: 2m 
  dependsOn:
    - name: metallb--metallb-system
      namespace: flux-system # TODO: do I need this?
  sourceRef:
    kind: GitRepository
    name: flux-system