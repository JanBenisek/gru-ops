apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: certs
  namespace: flux-system
spec:
  path: ./gitops/manifests/cert-manager/certs
  interval: 10m0s
  prune: true
  timeout: 20m
  dependsOn:
    - name: cert-manager
      namespace: flux-system
    - name: sealed-secrets
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  
