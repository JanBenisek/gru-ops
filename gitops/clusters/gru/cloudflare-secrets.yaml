apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-secrets
  namespace: flux-system
spec:
  path: ./gitops/manifests/cloudflare/secrets
  interval: 15m
  prune: true # remove any elements later removed from the above path
  timeout: 20m
  dependsOn:
    - name: sealed-secrets
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system