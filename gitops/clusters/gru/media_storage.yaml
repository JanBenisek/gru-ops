apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: media_storage
  namespace: flux-system
spec:
  path: ./gitops/manifests/media_storage
  interval: 15m
  prune: true
  timeout: 10m
  validation: server
  dependsOn:
    - name: openebs
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values