apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: radarr
  namespace: flux-system
spec:
  path: ./gitops/manifests/media/bazarr
  interval: 15m
  prune: true
  timeout: 10m
  validation: server
  dependsOn:
    - name: media-init
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: bazarr
      namespace: media