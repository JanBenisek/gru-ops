apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
resources:
  - metallb.yaml
  - metallb-crds.yaml
  - ingress-nginx.yaml
  - sealed-secrets.yaml
  - external-dns-secrets.yaml
  - external-dns.yaml
  - cert-manager-secrets.yaml # might not be the best, let's review
  - cert-manager.yaml
  - certs.yaml #it takes a ~10m to set up and propagate, patience!
  - secret-replicator.yaml
  - openebs.yaml
  - harbor.yaml
  # Apps
  - hiker.yaml
  - stirling.yaml
  - loki.yaml
  # - grafana.yaml
  - it-tools.yaml
  - homepage.yaml
  # test
configMapGenerator:
  - name: gru-values
    envs:
      - .env
configurations:
  - kustomizeconfig.yaml