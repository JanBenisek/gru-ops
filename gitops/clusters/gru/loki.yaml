apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: loki
  namespace: flux-system
spec:
  path: ./gitops/manifests/monitoring/loki
  interval: 15m
  prune: true 
  timeout: 20m
  dependsOn:
    - name: external-dns
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
