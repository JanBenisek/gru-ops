apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: cloudflare
  namespace: flux-system
spec:
  path: ./gitops/manifests/cloudflare/controller
  interval: 15m
  prune: true 
  timeout: 20m 
  dependsOn:
    - name: ingress-nginx
      namespace: flux-system
    - name: sealed-secrets
      namespace: flux-system
    - name: cloudflare-secrets
      namespace: flux-system
  validation: server
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: cloudflare
      namespace: cloudflare