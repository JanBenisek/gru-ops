apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: grafana
  namespace: flux-system
spec:
  dependsOn:
    - name: external-dns
      namespace: flux-system
  interval: 15m
  path: ./gitops/manifests/monitoring/grafana
  prune: true 
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  timeout: 20m 
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: server
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: kube-prometheus-stack-grafana
      namespace: monitoring