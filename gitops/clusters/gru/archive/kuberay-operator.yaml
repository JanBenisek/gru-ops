apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: kuberay-operator
  namespace: flux-system
spec:
  path: ./gitops/manifests/kuberay/operator
  interval: 15m
  prune: true 
  timeout: 20m 
  validation: server
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: kuberay-operator
      namespace: kuberay