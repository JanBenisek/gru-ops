apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: cnpg-crds
  namespace: flux-system
spec:
  path: ./gitops/manifests/cnpg/crds
  interval: 15m
  prune: true 
  timeout: 20m 
  validation: server
  dependsOn:
    - name: external-dns
      namespace: flux-system
    - name: openebs
      namespace: flux-system
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
    - kind: ConfigMap
      name: gru-values
  # TODO: enable later
