---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 5m
  url: https://metallb.github.io/metallb
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 1m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  chart:
    spec:
      chart: metallb
      version: '0.14.5'
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: metallb-system

