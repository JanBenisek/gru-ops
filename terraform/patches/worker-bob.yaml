debug: false
persist: true

machine:
  type: worker

  kernel:
    modules:
      - name: btrfs
      - name: iscsi_tcp
      - name: libiscsi_tcp
      - name: scsi_transport_iscsi
      - name: dm_multipath
      - name: overlay

  kubelet:
    image: ${kubelet_image}

  network:
    hostname: ${hostname}

  install:
    disk: /dev/sda
    image: ${talos_installer_image}
    wipe: true

  features:
    hostDNS:
      enabled: true
