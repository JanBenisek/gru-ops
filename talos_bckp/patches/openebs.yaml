# patches/openebs.yaml
# https://www.talos.dev/v1.8/kubernetes-guides/configuration/storage/
# https://www.talos.dev/v1.8/kubernetes-guides/configuration/replicated-local-storage-with-openebs/
# https://openebs.io/docs/Solutioning/openebs-on-kubernetes-platforms/talos
- op: add
  path: /machine/sysctls
  value:
    vm.nr_hugepages: "1024"

- op: add
  path: /machine/nodeLabels
  value:
    openebs.io/engine: "mayastor"

- op: add
  path: /machine/kubelet/extraMounts
  value:
    - destination: /var/local
      type: bind
      source: /var/local
      options:
        - bind
        - rshared
        - rw