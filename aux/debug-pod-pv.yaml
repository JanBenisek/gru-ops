apiVersion: v1
kind: Pod
metadata:
  name: radarr-debug
  namespace: ollama
spec:
  nodeSelector:
    kubernetes.io/hostname: stuart 
  securityContext:
    runAsUser: 321  #all processes in the pod run with user ID 321
    runAsGroup: 321  # same but for groups
    fsGroup: 321 # owner of attached volume is group 321
  containers:
    - name: radarr
      # image: busybox
      # command: ["sleep", "3600"]
      image: alpine
      command: ["/bin/sh", "-c", "apk add --no-cache vim && sleep 3600"]
      securityContext:
        runAsUser: 0  # Allow root user for package installation
      env:
        - name: PUID
          value: "321" 
        - name: PGID
          value: "321"   
        - name: UMASK
          value: "002" 
        - name: TZ
          value: "Etc/UTC" # Timezone
      resources:
        requests:
          memory: "300Mi"  
          cpu: "200m"      
        limits:
          memory: "500Mi"  
          cpu: "500m"
      volumeMounts:
        # - mountPath: /config  # Mount for Radarr config
        #   name: config-storage
        - mountPath: /data # Single volume for Movies and Downloads
          name: data-storage
  volumes:
    # - name: config-storage
    #   persistentVolumeClaim:
    #     claimName: pvc-radarr-config # PVC for config storage
    - name: data-storage
      persistentVolumeClaim:
        claimName: nfs-pvc   # PVC for data storage

--- 
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-pvc
  namespace: ollama
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: openebs-nfs