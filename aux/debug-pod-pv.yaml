# another useful debug pod
# k debug -it node/stuart --image alpine --profile=sysadmin -n kube-system

apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: media
spec:
  nodeSelector:
    kubernetes.io/hostname: stuart 
  securityContext:
    runAsUser: 421  #all processes in the pod run with user ID 321
    runAsGroup: 321  # same but for groups
    fsGroup: 321 # owner of attached volume is group 321
  containers:
    - name: debug-pod
      # image: busybox
      # command: ["sleep", "3600"]
      image: alpine
      command: ["/bin/sh", "-c", "apk add --no-cache vim && sleep 3600"]
      securityContext:
        runAsUser: 0  # Allow root user for package installation
      env:
        - name: PUID
          value: "421" 
        - name: PGID
          value: "321"   
        - name: UMASK
          value: "002" 
        - name: TZ
          value: "Etc/UTC" # Timezone
      resources:
        requests:
          memory: "300Mi"  
          cpu: "200m"      
        limits:
          memory: "500Mi"  
          cpu: "500m"
      volumeMounts:
        - mountPath: /data 
          name: media-storage
  volumes:
    - name: media-storage
      persistentVolumeClaim:
        claimName: pvc-media 