apiVersion: v1
kind: Pod
metadata:
  name: synology-test
  namespace: synology-csi
spec:
  containers:
  - name: test
    image: curlimages/curl:latest
    command: ["/bin/sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: client-info
      mountPath: /etc/synology
      readOnly: true
  volumes:
  - name: client-info
    secret:
      secretName: client-info-secret
  restartPolicy: Never