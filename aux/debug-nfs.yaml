apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: openebs-nfs
  namespace: openebs
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: openebs.io/provisioner-iscsi
reclaimPolicy: Delete # is default
parameters:
  openebs.io/provisioner-class: "nfs"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: openebs
  labels:
    app: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      containers:
        - name: nfs-server
          image: itsthenetwork/nfs-server-alpine
          # https://github.com/sjiveson/nfs-server-alpine
          securityContext:
            capabilities:
              add: ["SYS_ADMIN", "SETPCAP"]
          ports:
            - containerPort: 2049
          env:
            - name: SHARED_DIRECTORY
              value: "/data"  # Set the shared directory path
          resources:
            requests:
              memory: "1G"  
              cpu: "200m"      
            limits:
              memory: "2G"  
              cpu: "500m"
          volumeMounts:
            - mountPath: /data
              name: nfs-share
      volumes:
      - name: nfs-share
        hostPath:
          # path: /mnt/nfs-share  # Path on the node where the NFS share will be
          path: /var/mnt/storage
          type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: openebs
spec:
  ports:
    - port: 2049
      name: nfs
  selector:
    app: nfs-server

