---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany  # NFS allows ReadWriteMany access mode
  persistentVolumeReclaimPolicy: Retain
  storageClassName: openebs-nfs
  nfs:
    path: /data
    server: nfs-server.default.svc.cluster.local  # Service name of the NFS server

