apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stirling
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/max-body-size: "100M"
    traefik.ingress.kubernetes.io/readtimeout: "1000s"
    traefik.ingress.kubernetes.io/writetimeout: "1000s"
    traefik.ingress.kubernetes.io/idletimeout: "1000s"
spec:
  ingressClassName: traefik
  rules:
  - host: stirling.pengiuns.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stirling
            port:
              number: 80
  tls:
  - hosts:
      - stirling.pengiuns.com
    secretName: letsencrypt-wildcard-cert-pengiuns.com-production
