apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling
  namespace: stirling
  labels:
    app: stirling
    app.kubernetes.io/name: stirling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stirling
  template:
    metadata:
      labels:
        app: stirling
        app.kubernetes.io/name: stirling
    spec:
      containers:
      - name: nginx
        image: frooodle/s-pdf:2.3.1
        # image: frooodle/s-pdf:latest-ultra-lite
        # image: frooodle/s-pdf:0.45.0-fat
        # image: frooodle/s-pdf:2.3.1
        # docker pull frooodle/s-pdf:2.3.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080 # internal port for the app
        resources: # added by me
          requests:
            memory: "256Mi"  
            cpu: "50m"      
          limits:
            memory: "1Gi"