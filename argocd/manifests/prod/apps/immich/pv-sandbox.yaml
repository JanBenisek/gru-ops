apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-immich
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  storageClassName: synology-storage-photos
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.178.96
    path: /volume1/photos
  persistentVolumeReclaimPolicy: Retain
