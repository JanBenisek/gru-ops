apiVersion: apps/v1
kind: StatefulSet # TODO: add volumeClaimTemplates
metadata:
  name: sabnzbd
  namespace: media
  labels:
    app: sabnzbd
    app.kubernetes.io/name: sabnzbd
spec:
  serviceName: sonarr
  replicas: 1

  podManagementPolicy: OrderedReady

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  selector:
    matchLabels:
      app: sabnzbd
      
  template:
    metadata:
      labels:
        app: sabnzbd
        app.kubernetes.io/name: sabnzbd
    spec:
      securityContext:
        runAsUser: 329  #all processes in the pod run with user ID 321
        runAsGroup: 321  # same but for groups
        fsGroup: 321 # owner of attached volume is group 321 
      containers:
        - name: sabnzbd
          image: ghcr.io/hotio/sabnzbd:release-4.5.5
          securityContext:
            runAsUser: 0  # Temporary root for setup, not great, but does not work otherwise
            allowPrivilegeEscalation: true
          imagePullPolicy: Always
          ports:
          - containerPort: 8080 
          env:
            - name: PUID
              # Process User ID - under which user will the containers processes run
              # Files inside the container belong to that user
              value: "329" 
            - name: PGID
              # Similar to the above. sabnzbd can modify files that belong to a specific group
              value: "321"   
            - name: UMASK
              # Default privileges. 002 is 775 = full access to user and group
              # and read/execute only to others
              value: "002" 
            - name: WEBUI_PORTS
              value: "8080/tcp,8080/udp"
            - name: TZ
              value: "Etc/UTC" # Timezone
            # Does not work
            # - name: HOST_WHITELIST
            #   value: "sabnzbd.pengiuns.com"
            # Config map also does not work (Details: https://sabnzbd.org/wiki/extra/hostname-check.html)
            # So fixing manually:
            # Install vim: apk update && apk add vim
            # In config/sabnzbd.ini, change: host_whitelist = sabnzbd-678bbb7686-d7dcp,sabnzbd.pengiuns.com works
            # Also otherwise keep it mind that the PVC might need to be deleted.
            # Details: https://sabnzbd.org/wiki/extra/hostname-check.html
          resources:
            requests:
              memory: "512Mi"  
              cpu: "50m"      
            limits:
              memory: "1G"  
              cpu: "200m"
          volumeMounts:
            - mountPath: /config  
              name: config-storage
            - mountPath: /data 
              name: media-storage
      volumes:
        - name: config-storage
          persistentVolumeClaim:
            claimName: pvc-sabnzbd-config # PVC for config storage
        - name: media-storage
          persistentVolumeClaim:
            claimName: pvc-media   # PVC for data storage
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd
  namespace: media
  labels:
    app.kubernetes.io/name: sabnzbd
spec:
  selector:
    app: sabnzbd
  ports:
  - name: http
    port: 80 # we talk to this
    protocol: TCP
    targetPort: 8080 # app listens here
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sabnzbd
  labels:
    app: sabnzbd
    app.kubernetes.io/name: sabnzbd
  annotations:
    kubernetes.io/ingress.class: "traefik"
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # nginx.ingress.kubernetes.io/proxy-connect-timeout: "1000"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "1000"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "100"
    # nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "1000"
spec:
  ingressClassName: traefik
  rules:
  - host: sabnzbd.pengiuns.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sabnzbd
            port:
              number: 80
  tls:
  - hosts:
      - sabnzbd.pengiuns.com
    secretName: letsencrypt-wildcard-cert-pengiuns.com-production
