apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
    app.kubernetes.io/name: qbittorrent
spec:
  serviceName: qbittorrent
  replicas: 1

  podManagementPolicy: OrderedReady

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  selector:
    matchLabels:
      app: qbittorrent
      
  template:
    metadata:
      labels:
        app: qbittorrent
        app.kubernetes.io/name: qbittorrent
    spec:
      securityContext:
        runAsUser: 323  #all processes in the pod run with user ID 321
        runAsGroup: 321  # same but for groups
        fsGroup: 321 # owner of attached volume is group 321 
      containers:
        - name: qbittorrent
          image: ghcr.io/hotio/qbittorrent:release-5.1.4
          securityContext:
            runAsUser: 0  # Temporary root for setup, not great, but does not work otherwise
            allowPrivilegeEscalation: true
          imagePullPolicy: Always
          ports:
          - containerPort: 8080 
          env:
            - name: PUID
              # Process User ID - under which user will the containers processes run
              # Files inside the container belong to that user
              value: "323" 
            - name: PGID
              # Similar to the above. Prowlarr can modify files that belong to a specific group
              value: "321"   
            - name: UMASK
              # Default privileges. 002 is 775 = full access to user and group
              # and read/execute only to others
              value: "002" 
            - name: TZ
              value: "Etc/UTC" # Timezone
          resources:
            requests:
              memory: "2Gi"  
              cpu: "50m"      
            limits:
              memory: "3Gi"  
              cpu: "500m"
          volumeMounts:
            - mountPath: /config 
              name: config-storage
            - mountPath: /data # In UI add /downloads/torrents
              name: media-storage
      volumes:
        - name: config-storage
          persistentVolumeClaim:
            claimName: pvc-qbittorrent-config 
        - name: media-storage
          persistentVolumeClaim:
            claimName: pvc-media
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  selector:
    app: qbittorrent
  ports:
  - name: http
    port: 80 # we talk to this
    protocol: TCP
    targetPort: 8080 # app listens here
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  labels:
    app: qbittorrent
    app.kubernetes.io/name: qbittorrent
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/max-body-size: "10M"
    traefik.ingress.kubernetes.io/readtimeout: "1000s"
    traefik.ingress.kubernetes.io/writetimeout: "1000s"
    traefik.ingress.kubernetes.io/idletimeout: "1000s"
spec:
  ingressClassName: traefik
  rules:
  - host: qbittorrent.pengiuns.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qbittorrent
            port:
              number: 80
  tls:
  - hosts:
      - qbittorrent.pengiuns.com
    secretName: letsencrypt-wildcard-cert-pengiuns.com-production
