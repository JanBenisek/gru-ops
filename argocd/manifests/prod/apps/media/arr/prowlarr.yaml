apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prowlarr
  namespace: media
  labels:
    app: prowlarr
    app.kubernetes.io/name: prowlarr
spec:
  serviceName: prowlarr
  replicas: 1

  podManagementPolicy: OrderedReady

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  selector:
    matchLabels:
      app: prowlarr
      
  template:
    metadata:
      labels:
        app: prowlarr
        app.kubernetes.io/name: prowlarr
    spec:
      securityContext:
        runAsUser: 322  #all processes in the pod run with user ID 321
        runAsGroup: 321  # same but for groups
        fsGroup: 321 # owner of attached volume is group 321 
      containers:
        - name: prowlarr
          image: ghcr.io/hotio/prowlarr:release-2.3.5.5327
          securityContext:
            runAsUser: 0  # Temporary root for setup, not great, but does not work otherwise
            # runAsGroup: 321 # Remove later
            # fsGroup: 321 # Remove later
            allowPrivilegeEscalation: true
          imagePullPolicy: Always
          ports:
          - containerPort: 9696 
          env:
            - name: PUID
              # Process User ID - under which user will the containers processes run
              # Files inside the container belong to that user
              value: "322" 
            - name: PGID
              # Similar to the above. Prowlarr can modify files that belong to a specific group
              value: "321"   
            - name: UMASK
              # Default privileges. 002 is 775 = full access to user and group
              # and read/execute only to others
              value: "002" 
            - name: TZ
              value: "Etc/UTC" # Timezone
          resources:
            requests:
              memory: "256Mi"  
              cpu: "50m"      
            limits:
              memory: "512Mi"  
              cpu: "300m"
          volumeMounts:
            - mountPath: /config  # Mount for Prowlarr config
              name: config-storage
      volumes:
        - name: config-storage
          persistentVolumeClaim:
            claimName: pvc-prowlarr-config # PVC for config storage
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media
  labels:
    app.kubernetes.io/name: prowlarr
spec:
  selector:
    app: prowlarr
  ports:
  - name: http
    port: 80 # we talk to this
    protocol: TCP
    targetPort: 9696 # app listens here
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prowlarr
  labels:
    app: prowlarr
    app.kubernetes.io/name: prowlarr
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/max-body-size: "10M"
    traefik.ingress.kubernetes.io/readtimeout: "1000s"
    traefik.ingress.kubernetes.io/writetimeout: "1000s"
    traefik.ingress.kubernetes.io/idletimeout: "1000s"
spec:
  ingressClassName: traefik
  rules:
  - host: prowlarr.pengiuns.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prowlarr
            port:
              number: 80
  tls:
  - hosts:
      - prowlarr.pengiuns.com
    secretName: letsencrypt-wildcard-cert-pengiuns.com-production
