# Use instead of Ingress
# Each app requires one like this if I want to use Auth
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: outline
  namespace: outline
  labels:
    tinyauth.apps.hiker.oauth.groups: family
spec:
  entryPoints:
    - web  # Using web (port 80) because Cloudflare Tunnel sends to traefik:80, not :443
           # TLS termination happens at Cloudflare, so internal traffic is HTTP
  routes:
    - match: Host(`outline.pengiuns.com`)
      kind: Rule
      middlewares:
        - name: tinyauth
          namespace: outline  # Explicitly specify namespace for cross-namespace middleware reference
      services:
        - name: outline
          port: 80 # matches service port