kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pvc-hiker
  namespace: hiker
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  storageClassName: synology-storage-nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  # volumeName: pv-hiker # this is static definition, dynamic creates PV automatically, which seems recommended
  # Keep it as an example now!
