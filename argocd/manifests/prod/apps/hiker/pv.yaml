apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-hiker
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  storageClassName: synology-storage-nfs
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: 192.168.178.96
    path: /volume2/pvc-hiker   # created manually by ssh into synology
  persistentVolumeReclaimPolicy: Delete
