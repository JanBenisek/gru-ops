kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: pvc-sandbox
  namespace: hiker
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  storageClassName: synology-storage-sandbox
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  # volumeName: pv-sandbox # this is static definition, dynamic creates PV automatically, which seems recommended
  # Keep it as an example now!
