apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tinyauth
  namespace: tinyauth
  labels:
    app: tinyauth
    app.kubernetes.io/name: tinyauth
spec:
  serviceName: tinyauth
  replicas: 1

  podManagementPolicy: OrderedReady

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  selector:
    matchLabels:
      app: tinyauth
  template:
    metadata:
      labels:
        app: tinyauth
        app.kubernetes.io/name: tinyauth
    spec:
      containers:
      - name: tinyauth
        image: ghcr.io/steveiliop56/tinyauth:v4
        imagePullPolicy: Always
        ports:
          - containerPort: 3000
        env:
          - name: APP_URL
            value: https://tinyauth.example.com
          - name: USERS
            value: user:$$2a$$10$$UdLYoJ5lgPsC0RKqYH/jMua7zIn0g9kPqWmhYayJYLaZQ/FTmH2/u # Username is user and password is password
        livenessProbe:
          httpGet:
            path: /api/healthcheck
            port: 3000
        readinessProbe:
          httpGet:
            path: /api/healthcheck
            port: 3000
        resources: # added by me
          requests:
            memory: "128Mi"  
            cpu: "10m"      
          limits:
            memory: "1Gi"