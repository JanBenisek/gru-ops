apiVersion: v1
kind: Service
metadata:
  name: tinyauth
  namespace: tinyauth
  labels:
    app.kubernetes.io/name: tinyauth
  annotations:
    external-dns.alpha.kubernetes.io/ttl: "300"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/hostname: tinyauth.pengiuns.com
    external-dns.alpha.kubernetes.io/target: d65bf19e-11ed-4df3-81c1-b76923b14de4.cfargotunnel.com
spec:
  selector:
    app: tinyauth
  ports:
    - port: 3000 # Service port (others talk to)
      targetPort: 3000 # App listens here
  type: ClusterIP

