global:
  checkNewVersion: false
  sendAnonymousUsage: false

deployment:
  replicas: 1

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

log:
  level: INFO
  filePath: "/traefik.log"
  format: json

accessLog:
  enabled: true
  format: json
  filePath: "/traefik-access.log"

resources:
  requests:
    memory: "256Mi"
    cpu: "10m"

service:
  type: LoadBalancer
  ports:
    web:
      port: 80
    websecure:
      port: 443
