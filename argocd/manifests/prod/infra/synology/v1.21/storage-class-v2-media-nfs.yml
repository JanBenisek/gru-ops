apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synology-storage-nfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "false" 
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.178.96         
  share: /volume1/temp 
  readOnly: "false"              
reclaimPolicy: Retain            
allowVolumeExpansion: true
volumeBindingMode: Immediate 
mountOptions:
  - nfsvers=4.1 # version to use       
  - rsize=1048576 # max bytes in single read, 1MiB
  - wsize=1048576 # max bytes in write read, 1MiB
  - timeo=600 # timeout before retry
  - retrans=2 # times we retry after time out before giving up
  - noatime # do not update the file’s "last access time" on read operations
  - nodiratime # same as noatime, but specifically for directories.
  - nolock  # disables locking, should be fine for media