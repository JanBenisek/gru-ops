# Default values for cloudflare-tunnel.

# Cloudflare parameters.
cloudflare:
  # Your Cloudflare account number.
  account: "6f72e3a2bfcc7b774fdcecc770035336"
  # The name of the tunnel this instance will serve
  tunnelName: "gru-ops-tunnel"
  # The ID of the above tunnel.
  tunnelId: "d65bf19e-11ed-4df3-81c1-b76923b14de4"
  # The secret for the tunnel.
  secret: ""
  # If defined, no secret is created for the credentials, and instead, the secret referenced is used
  secretName: cloudflare-tunel-credentials
  # If true, turn on WARP routing for TCP
  enableWarp: false
  # Define ingress rules for the tunnel. See
  # https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/configuration/configuration-file/ingress
  ingress:
    # Opening immich share
    - hostname: immich-share.pengiuns.com
      service: http://192.168.178.100
    
    # Testing publicy opening a website
    - hostname: funnaiest.com
      service: http://traefik.traefik.svc.cluster.local:80 # But also works of course http://192.168.178.100
    
    # TinyAuth login page
    - hostname: tinyauth.pengiuns.com
      service: http://tinyauth.tinyauth.svc.cluster.local:3000
    
    # Hiker app (protected via TinyAuth middleware)
    - hostname: hiker.pengiuns.com
      service: http://traefik.traefik.svc.cluster.local:80

    # Pocket-ID
    - hostname: pocket-id.pengiuns.com
      service: http://traefik.traefik.svc.cluster.local:80

    # Outline
    - hostname: outline.pengiuns.com
      service: http://traefik.traefik.svc.cluster.local:80


image:
  repository: cloudflare/cloudflared
  pullPolicy: IfNotPresent
  # If supplied, this overrides "appVersion"
  tag: "2026.2.0" # the Helm chart is not updated anymore, this is bit of a hack

replicaCount: 2

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

# Security items common to everything in the pod.  Here we require that it
# does not run as the user defined in the image, literally named "nonroot".
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532

# Security items for one container. We lock it down.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

# Default affinity is to spread out over nodes; use this to override.
affinity: {}