apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: backup-immich-db-schedule
  namespace: cnpg
spec:
  podConfigRef:
    name: backup-env-config-immich-db
  backend:
    # Hetzner Storage Box via SFTP
    # Format: sftp://username@server:23/path
    # Port 23 is mandatory for Hetzner Storage Box
    sftp:
      url: sftp://u565059@u565059.your-storagebox.de:23/k8up-backups/postgres/immich
      passwordSecretRef:
        name: hetzner-credentials
        key: password
    # Restic encryption password
    repoPasswordSecretRef:
      name: restic-credentials
      key: password
  backup:
    schedule: "0 1 * * *" # runs daily at 1am should run BEFORE pvc backup
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
    promURL: http://kube-prometheus-stack-prometheus-pushgateway.monitoring.svc.cluster.local:9091
  check:
    schedule: '0 1 * * 1' # runs every monday, validates integrity of backup
    promURL: http://kube-prometheus-stack-prometheus-pushgateway.monitoring.svc.cluster.local:9091
  prune:
    schedule: '0 1 * * 0' #Every sunday at 1am, prunes based on retention policy
    retention:
      keepLast: 5 # keeps last 5 snapshots
      keepDaily: 14 # one backup per day for 14 days