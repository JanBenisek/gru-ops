apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cnpg-daily-backup
  namespace: cnpg
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  # Daily backup at 2am
  schedule: "0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: cnpg
  # Take first backup immediately after creation
  immediate: true
