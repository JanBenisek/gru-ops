apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: docker-registry
  labels:
    app: docker-registry
    app.kubernetes.io/name: docker-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      containers:
      - name: docker-registry
        image: registry:3.0
        imagePullPolicy: Always
        env:
          # disabling OTEL for now
          - name: OTEL_SDK_DISABLED
            value: "true"
          - name: OTEL_TRACES_EXPORTER
            value: "none"
          - name: OTEL_METRICS_EXPORTER
            value: "none"
          - name: OTEL_LOGS_EXPORTER
            value: "none"
        ports:
        - containerPort: 5000 # internal port for the app
        resources: 
          requests:
            memory: "125Mi"  
            cpu: "10m"      
          limits:
            memory: "256Mi"  
            cpu: "200m"    
        volumeMounts:
          - name: registry-config
            mountPath: /etc/docker/registry/config.yml
            subPath: config.yml
          - name: registry-data
            mountPath: /var/lib/registry
      volumes:
        - name: registry-config
          configMap:
            name: docker-registry-config
            items:
              - key: config.yml
                path: config.yml
        - name: registry-data
          persistentVolumeClaim:
            claimName: pvc-docker-registry