apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - repo-quay-jetstack.yaml # we need to enable OCI for infra apps
  - https://github.com/argoproj/argo-cd/manifests/cluster-install?ref=v3.2.2

secretGenerator:
  - name: github-repo
    namespace: argocd
    envs:
      - .argocd_env # has GITHUB_TOKEN
    literals:
      - type=git
      - url=https://github.com/JanBenisek/gru-ops.git
      - username=JanBenisek

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Secret
      name: github-repo
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          argocd.argoproj.io/secret-type: repository
