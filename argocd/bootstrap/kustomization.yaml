apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://github.com/argoproj/argo-cd/manifests/cluster-install?ref=v2.11.2

secretGenerator:
  - name: github-repo
    namespace: argocd
    literals:
      - type=git
      - url=https://github.com/JanBenisek/gruops.git
      - username=JanBenisek
      - password=${GITHUB_TOKEN}

generatorOptions:
  disableNameSuffixHash: true
