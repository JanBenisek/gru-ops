apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: gru
  sources:
    # CRDs
    - chart: cloudnative-pg
      repoURL: https://cloudnative-pg.github.io/charts
      targetRevision: "0.27.0"
      helm:
        releaseName: cnpg-operator
    # Actual cluster
    - repoURL: https://github.com/JanBenisek/gru-ops.git
      targetRevision: main
      path: argocd/manifests/prod/infra/cnpg
      directory:
        recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: cnpg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true

  # There is constant diff in these fields, seems ok, so ignoring
  ignoreDifferences:
    - group: ""
      kind: Service
      name: cnpg-rw-lb
      jsonPointers:
        - /spec/ports/0/protocol
        - /spec/updateStrategy