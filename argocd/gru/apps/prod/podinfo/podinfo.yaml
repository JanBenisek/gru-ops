apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
spec:
  project: gru
  sources:
  - repoURL: https://stefanprodan.github.io/podinfo
    chart: podinfo
    targetRevision: 6.0.0
    helm:
      valueFiles:
      - values.yaml
  - repoURL: https://github.com/JanBenisek/gruops.git
    targetRevision: main
    path: argocd/gru/apps/prod/podinfo
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true