apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"  
spec:
  project: gru
  source:
    repoURL: https://metallb.github.io/metallb 
    chart: metallb
    targetRevision: 0.14.5                     
    helm:
      valueFiles:
        - values.yaml                          
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb
  syncPolicy:
    automated:
      prune: true
      selfHeal: true


